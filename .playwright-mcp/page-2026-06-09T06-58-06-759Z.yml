              - heading "Dhammadeep Meshram" [level=4]
              - generic: Associate Software Quality Engineer
              - paragraph: Hi, I'm Dhammadeep Meshram, currently working as an Associate Software Quality Engineer. I have experience in Quality Assurance across multiple domains, with expertise in various testing tools and technologies, including Java, Python, Selenium, Cypress, Playwright, Rest Assured, and JMeter. In the era of AI, I decided not to be left behind—so I've been exploring AI Agents, MCP, and Evaluations. Basically, I'm teaching myself to speak robot before robots start teaching me! I'm always looking for challenges and eager to learn new AI techs!
